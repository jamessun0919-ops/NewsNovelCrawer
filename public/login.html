<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 文章閱讀器</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2f6feb">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="文章閱讀器">
</head>
<body>
<header class="top-bar">
  <h1>文章閱讀器</h1>
</header>
<main>
  <form id="login-form" class="login-form">
    <label>帳號
      <input type="text" id="username" autocomplete="username" required>
    </label>
    <label>密碼
      <input type="password" id="password" autocomplete="current-password" required>
    </label>
    <button type="submit">登入</button>
    <div id="msg"></div>
  </form>
</main>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const msgEl = document.getElementById('msg');
  msgEl.innerHTML = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      msgEl.innerHTML = `<div class="error-box">${data.error}</div>`;
      return;
    }
    location.href = '/';
  } catch (err) {
    msgEl.innerHTML = `<div class="error-box">登入失敗：${err.message}</div>`;
  }
});
</script>
</body>
</html>
