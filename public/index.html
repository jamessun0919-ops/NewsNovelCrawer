<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章閱讀器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-bar">
  <h1>文章閱讀器</h1>
  <a class="back-link" href="#" id="logout-link" style="margin-left:auto">登出</a>
</header>
<main>
  <div class="type-choices">
    <a class="choice-btn" href="sources.html?type=NEWS">看新聞</a>
    <a class="choice-btn" href="sources.html?type=Novel">看小說</a>
  </div>
</main>
<script>
document.getElementById('logout-link').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
});
</script>
</body>
</html>
